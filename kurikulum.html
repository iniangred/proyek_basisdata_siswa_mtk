<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Kurikulum Pro - Ang</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card-kurikulum { border-left: 5px solid #0d6efd; margin-bottom: 25px; border-radius: 12px; }
        .elemen-box { background: #ffffff; border-radius: 10px; padding: 20px; margin-top: 15px; border: 1px solid #dee2e6; }
        .cp-box { border-left: 4px solid #198754; padding-left: 15px; margin-top: 15px; }
        .tp-box { background: #f8f9fa; border-left: 4px solid #ffc107; padding: 15px; margin-top: 10px; border-radius: 8px; }
        .atp-item { background: #ffffff; border: 1px solid #e0e0e0; padding: 10px; margin-top: 8px; border-radius: 6px; border-left: 4px solid #0dcaf0; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">Sam-App</span>
            <div class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0 fw-bold">Master Kurikulum & ATP</h4>
            <div class="d-flex gap-2">
                <button onclick="eksporData()" class="btn btn-outline-dark btn-sm">📤 Ekspor</button>
                <input type="file" id="importFile" style="display:none" onchange="imporData(event)">
                <button onclick="document.getElementById('importFile').click()" class="btn btn-outline-dark btn-sm">📥 Impor</button>
            </div>
        </div>

        <div class="card shadow-sm mb-4 border-0">
            <div class="card-body p-4">
                <h6 class="fw-bold mb-3">Identitas Mata Pelajaran</h6>
                <div class="row g-2">
                    <div class="col-md-3">
                        <input type="text" id="namaMapel" class="form-control" placeholder="Nama Mapel (ex: Matematika)">
                    </div>
                    <div class="col-md-2">
                        <input list="faseOptions" id="faseMapel" class="form-control" placeholder="Fase / Ketik Manual">
                        <datalist id="faseOptions">
                            <option value="A">
                            <option value="B">
                            <option value="C">
                            <option value="D">
                            <option value="E">
                            <option value="F">
                        </datalist>
                    </div>
                    <div class="col-md-2">
                        <input list="kelasOptions" id="kelasMapel" class="form-control" placeholder="Kelas / Ketik Jurusan">
                        <datalist id="kelasOptions">
                            <option value="10">
                            <option value="11">
                            <option value="12">
                        </datalist>
                    </div>
                    <div class="col-md-3">
                        <select id="jenisMapel" class="form-select">
                            <option value="Wajib">Wajib</option>
                            <option value="Pilihan">Pilihan</option>
                            <option value="Mulok">Mulok</option>
                            <option value="Kejuruan">Kejuruan (SMK)</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button onclick="simpanMapel()" class="btn btn-primary w-100">Tambah Mapel</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="containerKurikulum"></div>
    </div>

    <div class="modal fade" id="modalUnsur" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalTitle">Edit Data</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="targetId">
                    <input type="hidden" id="targetType">
                    <input type="hidden" id="actionType">
                    
                    <div class="mb-3">
                        <label id="labelInput" class="form-label fw-bold">Konten/Deskripsi</label>
                        <textarea id="kontenUnsur" class="form-control" rows="3" placeholder="Masukkan deskripsi..."></textarea>
                    </div>

                    <div id="atpFields" style="display:none" class="row g-2">
                        <div class="col-6">
                            <label class="form-label fw-bold">Semester</label>
                            <select id="atpSemester" class="form-select">
                                <option value="1">Ganjil (1)</option>
                                <option value="2">Genap (2)</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-bold">Alokasi Waktu (JP)</label>
                            <input type="number" id="atpJP" class="form-control" placeholder="Contoh: 4">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="simpanUnsur()" class="btn btn-primary w-100">Simpan Data</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let db_kurikulum = JSON.parse(localStorage.getItem('db_kurikulum')) || [];
        const modal = new bootstrap.Modal(document.getElementById('modalUnsur'));

        function muatKurikulum() {
            const container = document.getElementById('containerKurikulum');
            container.innerHTML = '';

            db_kurikulum.forEach((m, mIdx) => {
                let card = `
                <div class="card shadow-sm card-kurikulum border-0 bg-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0">${m.nama} <span class="badge bg-primary ms-2">Fase ${m.fase} / Kls ${m.kelas}</span> <span class="badge bg-secondary ms-1">${m.jenis}</span></h5>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary" onclick="bukaModal('${mIdx}', 'elemen', 'tambah')">+ Input Elemen</button>
                                <button class="btn btn-sm btn-outline-danger" onclick="hapusUnsur('${mIdx}', 'mapel')">🗑️</button>
                            </div>
                        </div>`;
                
                if(m.elemen) {
                    m.elemen.forEach((e, eIdx) => {
                        card += `
                        <div class="elemen-box">
                            <div class="d-flex justify-content-between align-items-center">
                                <h6 class="text-primary fw-bold mb-0">🔹 Elemen: ${e.nama}</h6>
                                <div class="btn-group">
                                    <button class="btn btn-sm btn-link text-muted p-0 me-2" onclick="bukaModal('${mIdx}-${eIdx}', 'elemen', 'edit')">✏️</button>
                                    <button class="btn btn-sm btn-link text-danger p-0 me-3" onclick="hapusUnsur('${mIdx}-${eIdx}', 'elemen')">🗑️</button>
                                    <button class="btn btn-sm btn-success" onclick="bukaModal('${mIdx}-${eIdx}', 'cp', 'tambah')">+ Input CP</button>
                                </div>
                            </div>`;
                        
                        if(e.cp) {
                            e.cp.forEach((c, cIdx) => {
                                card += `
                                <div class="cp-box">
                                    <div class="d-flex justify-content-between">
                                        <p class="small mb-1 text-success fw-bold">Capaian Pembelajaran (CP):</p>
                                        <div class="btn-group">
                                            <button class="btn btn-sm btn-link text-muted p-0 me-2" onclick="bukaModal('${mIdx}-${eIdx}-${cIdx}', 'cp', 'edit')">✏️</button>
                                            <button class="btn btn-sm btn-link text-danger p-0 me-3" onclick="hapusUnsur('${mIdx}-${eIdx}-${cIdx}', 'cp')">🗑️</button>
                                            <button class="btn btn-sm btn-warning text-dark fw-bold" onclick="bukaModal('${mIdx}-${eIdx}-${cIdx}', 'tp', 'tambah')">+ Input TP</button>
                                        </div>
                                    </div>
                                    <p class="small mb-2 p-2 bg-light rounded">${c.isi}</p>`;
                                
                                if(c.tp) {
                                    c.tp.forEach((t, tIdx) => {
                                        card += `
                                        <div class="tp-box shadow-sm">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <p class="mb-2 fw-bold text-dark" style="font-size: 0.9rem;">🎯 TP: ${t.isi}</p>
                                                <div class="btn-group">
                                                    <button class="btn btn-sm btn-link text-muted p-0 me-2" onclick="bukaModal('${mIdx}-${eIdx}-${cIdx}-${tIdx}', 'tp', 'edit')">✏️</button>
                                                    <button class="btn btn-sm btn-link text-danger p-0 me-3" onclick="hapusUnsur('${mIdx}-${eIdx}-${cIdx}-${tIdx}', 'tp')">🗑️</button>
                                                    <button class="btn btn-sm btn-info text-dark fw-bold" onclick="bukaModal('${mIdx}-${eIdx}-${cIdx}-${tIdx}', 'atp', 'tambah')">+ Input ATP</button>
                                                </div>
                                            </div>`;
                                            
                                        if(t.atp) {
                                            t.atp.forEach((a, aIdx) => {
                                                card += `
                                                <div class="atp-item d-flex justify-content-between align-items-center">
                                                    <div>
                                                        <span class="badge bg-info text-dark me-2">ATP ${aIdx+1}</span>
                                                        <span class="small">${a.isi}</span>
                                                        <span class="badge bg-light text-muted border ms-2">Smt ${a.smt} | ${a.jp} JP</span>
                                                    </div>
                                                    <div class="btn-group">
                                                        <button class="btn btn-sm btn-link text-muted p-0 me-2" onclick="bukaModal('${mIdx}-${eIdx}-${cIdx}-${tIdx}-${aIdx}', 'atp', 'edit')">✏️</button>
                                                        <button class="btn btn-sm btn-link text-danger p-0" onclick="hapusUnsur('${mIdx}-${eIdx}-${cIdx}-${tIdx}-${aIdx}', 'atp')">🗑️</button>
                                                    </div>
                                                </div>`;
                                            });
                                        }
                                        card += `</div>`;
                                    });
                                }
                                card += `</div>`;
                            });
                        }
                        card += `</div>`;
                    });
                }
                card += `</div></div>`;
                container.innerHTML += card;
            });
        }

        function bukaModal(id, type, action) {
            document.getElementById('targetId').value = id;
            document.getElementById('targetType').value = type;
            document.getElementById('actionType').value = action;
            document.getElementById('modalTitle').innerText = (action === 'edit' ? "Edit " : "Tambah ") + type.toUpperCase();
            
            document.getElementById('atpFields').style.display = (type === 'atp') ? 'flex' : 'none';
            document.getElementById('labelInput').innerText = "Deskripsi " + type.toUpperCase();
            
            if(action === 'edit') {
                const ids = id.split('-');
                if(type === 'elemen') document.getElementById('kontenUnsur').value = db_kurikulum[ids[0]].elemen[ids[1]].nama;
                else if(type === 'cp') document.getElementById('kontenUnsur').value = db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].isi;
                else if(type === 'tp') document.getElementById('kontenUnsur').value = db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp[ids[3]].isi;
                else if(type === 'atp') {
                    let atp = db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp[ids[3]].atp[ids[4]];
                    document.getElementById('kontenUnsur').value = atp.isi;
                    document.getElementById('atpSemester').value = atp.smt;
                    document.getElementById('atpJP').value = atp.jp;
                }
            } else {
                document.getElementById('kontenUnsur').value = '';
                document.getElementById('atpJP').value = '';
            }
            modal.show();
        }

        function simpanUnsur() {
            const id = document.getElementById('targetId').value;
            const type = document.getElementById('targetType').value;
            const action = document.getElementById('actionType').value;
            const konten = document.getElementById('kontenUnsur').value;
            const ids = id.split('-');

            if(!konten) return alert("Deskripsi tidak boleh kosong!");

            if(action === 'tambah') {
                if(type === 'elemen') db_kurikulum[ids[0]].elemen.push({ nama: konten, cp: [] });
                else if(type === 'cp') db_kurikulum[ids[0]].elemen[ids[1]].cp.push({ isi: konten, tp: [] });
                else if(type === 'tp') db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp.push({ isi: konten, atp: [] });
                else if(type === 'atp') {
                    db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp[ids[3]].atp.push({ 
                        isi: konten, 
                        smt: document.getElementById('atpSemester').value, 
                        jp: document.getElementById('atpJP').value || 0 
                    });
                }
            } else {
                if(type === 'elemen') db_kurikulum[ids[0]].elemen[ids[1]].nama = konten;
                else if(type === 'cp') db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].isi = konten;
                else if(type === 'tp') db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp[ids[3]].isi = konten;
                else if(type === 'atp') {
                    let atp = db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp[ids[3]].atp[ids[4]];
                    atp.isi = konten;
                    atp.smt = document.getElementById('atpSemester').value;
                    atp.jp = document.getElementById('atpJP').value;
                }
            }

            localStorage.setItem('db_kurikulum', JSON.stringify(db_kurikulum));
            modal.hide();
            muatKurikulum();
        }

        function hapusUnsur(id, type) {
            if(!confirm("Hapus data " + type.toUpperCase() + " ini secara permanen?")) return;
            const ids = id.split('-');
            
            if(type === 'mapel') db_kurikulum.splice(ids[0], 1);
            else if(type === 'elemen') db_kurikulum[ids[0]].elemen.splice(ids[1], 1);
            else if(type === 'cp') db_kurikulum[ids[0]].elemen[ids[1]].cp.splice(ids[2], 1);
            else if(type === 'tp') db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp.splice(ids[3], 1);
            else if(type === 'atp') db_kurikulum[ids[0]].elemen[ids[1]].cp[ids[2]].tp[ids[3]].atp.splice(ids[4], 1);
            
            localStorage.setItem('db_kurikulum', JSON.stringify(db_kurikulum));
            muatKurikulum();
        }

        function simpanMapel() {
            const nama = document.getElementById('namaMapel').value;
            const fase = document.getElementById('faseMapel').value || "Belum diisi";
            const kelas = document.getElementById('kelasMapel').value || "Belum diisi";
            const jenis = document.getElementById('jenisMapel').value;
            
            if(!nama) return alert("Tuliskan nama mapel!");
            
            db_kurikulum.push({ nama, fase, kelas, jenis, elemen: [] });
            localStorage.setItem('db_kurikulum', JSON.stringify(db_kurikulum));
            muatKurikulum();
            
            // Reset input
            document.getElementById('namaMapel').value = '';
            document.getElementById('faseMapel').value = '';
            document.getElementById('kelasMapel').value = '';
        }

        function eksporData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db_kurikulum));
            const dl = document.createElement('a');
            dl.setAttribute("href", dataStr);
            dl.setAttribute("download", "kurikulum_ang_final.json");
            dl.click();
        }

        function imporData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db_kurikulum = JSON.parse(e.target.result);
                localStorage.setItem('db_kurikulum', JSON.stringify(db_kurikulum));
                muatKurikulum();
            };
            reader.readAsText(event.target.files[0]);
        }

        window.onload = muatKurikulum;
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SAM Assistant Ready!'))
                .catch(err => console.log('Gagal memuat SAM', err));
        });
    }
    </script>
</body>
</html>
