<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Harian Pro - Ang</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        .absensi-row:hover { background-color: #f8f9fa; }
        .radio-absensi input[type="radio"] { display: none; }
        .radio-absensi label { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; font-size: 0.8rem; margin-right: 2px; }
        .radio-absensi input[type="radio"]:checked + label.lbl-h { background-color: #198754; color: white; border-color: #198754; }
        .radio-absensi input[type="radio"]:checked + label.lbl-s { background-color: #0dcaf0; color: white; border-color: #0dcaf0; }
        .radio-absensi input[type="radio"]:checked + label.lbl-i { background-color: #ffc107; color: black; border-color: #ffc107; }
        .radio-absensi input[type="radio"]:checked + label.lbl-a { background-color: #dc3545; color: white; border-color: #dc3545; }
        
        .card-riwayat { border-left: 4px solid #0d6efd; margin-bottom: 15px; transition: 0.2s; }
        .card-riwayat:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .filter-panel { background-color: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #dee2e6; }
        .pagination-jurnal { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid #eee; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <span class="navbar-brand fw-bold">Sam-App</span>
            <div class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row">
            
            <div class="col-lg-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="mb-0 fw-bold">📝 Isi Jurnal & Absensi Hari Ini</h5>
                    </div>
                    <div class="card-body p-4">
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-5">
                                <label class="fw-bold small">Tanggal Mengajar</label>
                                <input type="date" id="tglJurnal" class="form-control">
                            </div>
                            <div class="col-md-7">
                                <label class="fw-bold small">Pilih Rombel / Kelas</label>
                                <select id="kelasJurnal" class="form-select" onchange="renderAbsensi()">
                                    <option value="">-- Pilih Kelas --</option>
                                </select>
                            </div>
                        </div>

                        <div id="areaAbsensi" style="display:none;" class="mb-4">
                            <h6 class="fw-bold bg-light p-2 border rounded">Daftar Kehadiran Siswa (Urut A-Z)</h6>
                            <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                                <table class="table table-sm align-middle mb-0">
                                    <thead class="table-light" style="position: sticky; top: 0; z-index: 1;">
                                        <tr>
                                            <th>Nama Siswa</th>
                                            <th class="text-center" style="min-width: 150px;">Kehadiran</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabelAbsensi"></tbody>
                                </table>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-5">
                                <label class="fw-bold small">Mata Pelajaran</label>
                                <select id="mapelJurnal" class="form-select" onchange="renderATP()">
                                    <option value="">-- Pilih Mapel --</option>
                                </select>
                            </div>
                            <div class="col-md-7">
                                <label class="fw-bold small">Materi Pokok (ATP)</label>
                                <select id="atpJurnal" class="form-select">
                                    <option value="">-- Pilih Mapel Dulu --</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="fw-bold small">Catatan KBM (Opsional)</label>
                            <textarea id="catatanJurnal" class="form-control" rows="3" placeholder="Kendala, progres, atau evaluasi hari ini..."></textarea>
                        </div>

                        <button onclick="simpanJurnal()" class="btn btn-success w-100 py-2 fw-bold text-uppercase">💾 Simpan Jurnal & Absensi</button>

                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card shadow-sm border-0 bg-white">
                    <div class="card-body p-4">
                        
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="fw-bold mb-0">📚 Riwayat Mengajar</h5>
                            
                            <div class="dropdown">
                                <button class="btn btn-sm btn-dark dropdown-toggle fw-bold" type="button" data-bs-toggle="dropdown">
                                    📤 Ekspor Pilihan
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow">
                                    <li><a class="dropdown-item fw-bold text-success" href="#" onclick="eksporPilihanExcel()">📗 Excel (.xlsx)</a></li>
                                    <li><a class="dropdown-item fw-bold text-danger" href="#" onclick="eksporPilihanPDF()">📄 PDF (Siap Print)</a></li>
                                </ul>
                            </div>
                        </div>

                        <div class="filter-panel">
                            <div class="row g-2 align-items-end">
                                <div class="col-md-4">
                                    <label class="small text-muted fw-bold">Tanggal</label>
                                    <input type="date" id="filterTgl" class="form-control form-control-sm">
                                </div>
                                <div class="col-md-4">
                                    <label class="small text-muted fw-bold">Kelas</label>
                                    <select id="filterKelas" class="form-select form-select-sm">
                                        <option value="">Semua Kelas</option>
                                    </select>
                                </div>
                                <div class="col-md-4 d-flex gap-1">
                                    <button onclick="terapkanFilter()" class="btn btn-sm btn-primary w-100">Cari</button>
                                    <button onclick="resetFilter()" class="btn btn-sm btn-outline-secondary">Reset</button>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-2 px-1">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="chkPilihSemua" onchange="togglePilihSemua(this)">
                                <label class="form-check-label small fw-bold" for="chkPilihSemua">Pilih Semua di Halaman Ini</label>
                            </div>
                            <small class="text-muted" id="infoTotalRiwayat">0 Catatan</small>
                        </div>

                        <hr class="mt-0">
                        
                        <div id="listRiwayat" style="min-height: 300px;">
                            </div>

                        <div class="pagination-jurnal mt-3">
                            <small class="text-muted fw-bold" id="infoHalJurnal">Hal 1/1</small>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary fw-bold" onclick="gantiHalJurnal(-1)">⬅ Prev</button>
                                <button class="btn btn-sm btn-outline-primary fw-bold" onclick="gantiHalJurnal(1)">Next ➡</button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const db_kelas = JSON.parse(localStorage.getItem('db_kelas')) || [];
        const db_siswa = JSON.parse(localStorage.getItem('database_siswa')) || [];
        const db_kurikulum = JSON.parse(localStorage.getItem('db_kurikulum')) || [];
        let db_jurnal = JSON.parse(localStorage.getItem('db_jurnal')) || [];

        // Variabel Pagination Riwayat
        let riwayatTampil = [];
        let halJurnalAktif = 1;
        const barisPerHalJurnal = 5; // Tampilkan 5 jurnal per halaman agar rapi

        window.onload = () => {
            document.getElementById('tglJurnal').valueAsDate = new Date(); 
            initDropdownKelas();
            initDropdownMapel();
            resetFilter(); 
        };

        function initDropdownKelas() {
            const selectJurnal = document.getElementById('kelasJurnal');
            const selectFilter = document.getElementById('filterKelas');
            
            // Sort kelas A-Z di dropdown
            let kelasSorted = [...db_kelas].map((k, i) => ({...k, idxLama: i}));
            kelasSorted.sort((a, b) => a.nama.localeCompare(b.nama));

            kelasSorted.forEach((k) => {
                selectJurnal.innerHTML += `<option value="${k.idxLama}">${k.nama}</option>`;
                selectFilter.innerHTML += `<option value="${k.nama}">${k.nama}</option>`;
            });
        }

        function initDropdownMapel() {
            const select = document.getElementById('mapelJurnal');
            db_kurikulum.forEach((m, index) => {
                select.innerHTML += `<option value="${index}">${m.nama} (Fase ${m.fase})</option>`;
            });
        }

        function renderATP() {
            const selectMapel = document.getElementById('mapelJurnal').value;
            const selectATP = document.getElementById('atpJurnal');
            selectATP.innerHTML = '<option value="">-- Pilih Materi (ATP) --</option>';

            if(selectMapel === "") return;
            const mapel = db_kurikulum[selectMapel];
            let foundATP = false;

            if(mapel.elemen) {
                mapel.elemen.forEach(e => {
                    if(e.cp) {
                        e.cp.forEach(c => {
                            if(c.tp) {
                                c.tp.forEach((t) => {
                                    if(t.atp && t.atp.length > 0) {
                                        t.atp.forEach((a, aIdx) => {
                                            foundATP = true;
                                            selectATP.innerHTML += `<option value="${a.isi}">ATP ${aIdx+1}: ${a.isi}</option>`;
                                        });
                                    }
                                });
                            }
                        });
                    }
                });
            }
            if(!foundATP) selectATP.innerHTML = '<option value="">-- Belum ada ATP --</option>';
        }

        // FITUR BARU: RENDER ABSENSI DENGAN SORTIR A-Z
        function renderAbsensi() {
            const indexKelas = document.getElementById('kelasJurnal').value;
            const area = document.getElementById('areaAbsensi');
            const tbody = document.getElementById('tabelAbsensi');
            tbody.innerHTML = '';

            if(indexKelas === "") {
                area.style.display = "none";
                return;
            }

            const kelas = db_kelas[indexKelas];
            const anggota = kelas.anggota || [];

            if(anggota.length === 0) {
                tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted">Kelas kosong.</td></tr>`;
            } else {
                // Mengambil detail siswa dan menyortirnya A-Z
                let dataSiswaKelas = anggota.map(nisn => db_siswa.find(s => s.nisn === nisn)).filter(s => s);
                dataSiswaKelas.sort((a, b) => a.nama.localeCompare(b.nama));

                dataSiswaKelas.forEach(siswa => {
                    tbody.innerHTML += `
                    <tr class="absensi-row">
                        <td class="fw-bold small">${siswa.nama}</td>
                        <td class="text-center radio-absensi">
                            <input type="radio" name="abs_${siswa.nisn}" id="h_${siswa.nisn}" value="H" checked>
                            <label class="lbl-h" for="h_${siswa.nisn}">H</label>
                            
                            <input type="radio" name="abs_${siswa.nisn}" id="s_${siswa.nisn}" value="S">
                            <label class="lbl-s" for="s_${siswa.nisn}">S</label>
                            
                            <input type="radio" name="abs_${siswa.nisn}" id="i_${siswa.nisn}" value="I">
                            <label class="lbl-i" for="i_${siswa.nisn}">I</label>
                            
                            <input type="radio" name="abs_${siswa.nisn}" id="a_${siswa.nisn}" value="A">
                            <label class="lbl-a" for="a_${siswa.nisn}">A</label>
                        </td>
                    </tr>`;
                });
            }
            area.style.display = "block";
        }

        function simpanJurnal() {
            const tgl = document.getElementById('tglJurnal').value;
            const indexKelas = document.getElementById('kelasJurnal').value;
            const indexMapel = document.getElementById('mapelJurnal').value;
            const atp = document.getElementById('atpJurnal').value;
            const catatan = document.getElementById('catatanJurnal').value;

            if(!tgl || indexKelas === "" || indexMapel === "" || !atp) {
                return alert("Lengkapi Tanggal, Kelas, Mapel, dan Materi!");
            }

            const namaKelas = db_kelas[indexKelas].nama;
            const anggota = db_kelas[indexKelas].anggota || [];
            
            let rekapAbsensi = {};
            let countH = 0, countS = 0, countI = 0, countA = 0;

            anggota.forEach(nisn => {
                const radioSiswa = document.querySelector(`input[name="abs_${nisn}"]:checked`);
                if(radioSiswa) {
                    const status = radioSiswa.value;
                    rekapAbsensi[nisn] = status;
                    if(status === 'H') countH++; if(status === 'S') countS++;
                    if(status === 'I') countI++; if(status === 'A') countA++;
                }
            });

            db_jurnal.push({
                tgl: tgl, kelas: namaKelas, mapel: db_kurikulum[indexMapel].nama,
                atp: atp, catatan: catatan, absensi: rekapAbsensi,
                statistik: { H: countH, S: countS, I: countI, A: countA }
            });

            localStorage.setItem('db_jurnal', JSON.stringify(db_jurnal));
            document.getElementById('catatanJurnal').value = '';
            document.getElementById('kelasJurnal').value = '';
            document.getElementById('areaAbsensi').style.display = 'none';
            alert("Jurnal tersimpan!");
            resetFilter(); 
        }

        function terapkanFilter() {
            const tgl = document.getElementById('filterTgl').value;
            const kelas = document.getElementById('filterKelas').value;
            
            riwayatTampil = db_jurnal.map((j, index) => ({...j, indexAsli: index}));
            if(tgl) riwayatTampil = riwayatTampil.filter(j => j.tgl === tgl);
            if(kelas) riwayatTampil = riwayatTampil.filter(j => j.kelas === kelas);

            riwayatTampil.sort((a, b) => new Date(b.tgl) - new Date(a.tgl));
            halJurnalAktif = 1; // Reset halaman
            renderDaftarRiwayat();
        }

        function resetFilter() {
            document.getElementById('filterTgl').value = '';
            document.getElementById('filterKelas').value = '';
            riwayatTampil = db_jurnal.map((j, index) => ({...j, indexAsli: index}));
            riwayatTampil.sort((a, b) => new Date(b.tgl) - new Date(a.tgl));
            halJurnalAktif = 1;
            renderDaftarRiwayat();
        }

        function gantiHalJurnal(arah) {
            const totalHalaman = Math.ceil(riwayatTampil.length / barisPerHalJurnal) || 1;
            halJurnalAktif += arah;
            if (halJurnalAktif < 1) halJurnalAktif = 1;
            if (halJurnalAktif > totalHalaman) halJurnalAktif = totalHalaman;
            renderDaftarRiwayat();
        }

        function renderDaftarRiwayat() {
            const list = document.getElementById('listRiwayat');
            list.innerHTML = '';
            
            document.getElementById('infoTotalRiwayat').innerText = `${riwayatTampil.length} Catatan (Total)`;
            document.getElementById('chkPilihSemua').checked = false;

            if(riwayatTampil.length === 0) {
                list.innerHTML = `<p class="text-center text-muted mt-4">Tidak ada data.</p>`;
                document.getElementById('infoHalJurnal').innerText = `Hal 1/1`;
                return;
            }

            // PAGINATION LOGIC
            const totalHalaman = Math.ceil(riwayatTampil.length / barisPerHalJurnal);
            const indexMulai = (halJurnalAktif - 1) * barisPerHalJurnal;
            const dataTampil = riwayatTampil.slice(indexMulai, indexMulai + barisPerHalJurnal);

            document.getElementById('infoHalJurnal').innerText = `Hal ${halJurnalAktif}/${totalHalaman}`;

            dataTampil.forEach((j) => {
                list.innerHTML += `
                <div class="card card-riwayat shadow-sm">
                    <div class="card-body p-3">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="form-check">
                                <input class="form-check-input chk-riwayat" type="checkbox" value="${j.indexAsli}" id="chk_${j.indexAsli}">
                                <label class="form-check-label fw-bold text-primary" for="chk_${j.indexAsli}">
                                    ${j.kelas}
                                </label>
                            </div>
                            <small class="text-muted fw-bold">${j.tgl}</small>
                        </div>
                        <p class="small mb-2"><span class="badge bg-secondary">${j.mapel}</span></p>
                        <p class="small fw-bold mb-1 text-dark">Materi: <span class="fw-normal">${j.atp}</span></p>
                        
                        <div class="d-flex gap-2 mt-2 pt-2 border-top align-items-center">
                            <span class="badge bg-success">H: ${j.statistik.H}</span>
                            <span class="badge bg-info text-white">S: ${j.statistik.S}</span>
                            <span class="badge bg-warning text-dark">I: ${j.statistik.I}</span>
                            <span class="badge bg-danger">A: ${j.statistik.A}</span>
                            <button class="btn btn-sm btn-link text-danger ms-auto p-0" onclick="hapusJurnal(${j.indexAsli})">Hapus</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function togglePilihSemua(checkboxObj) {
            const isChecked = checkboxObj.checked;
            const checkboxes = document.querySelectorAll('.chk-riwayat');
            checkboxes.forEach(cb => cb.checked = isChecked);
        }

        function hapusJurnal(indexAsli) {
            if(confirm("Hapus catatan jurnal ini secara permanen?")) {
                db_jurnal.splice(indexAsli, 1);
                localStorage.setItem('db_jurnal', JSON.stringify(db_jurnal));
                terapkanFilter(); 
            }
        }

        function dapatkanNamaAbsen(absensiObj) {
            let sakit = [], izin = [], alpa = [];
            for (let nisn in absensiObj) {
                let status = absensiObj[nisn];
                if (status !== 'H') {
                    let siswa = db_siswa.find(s => s.nisn === nisn);
                    let nama = siswa ? siswa.nama : nisn;
                    if(status === 'S') sakit.push(nama);
                    if(status === 'I') izin.push(nama);
                    if(status === 'A') alpa.push(nama);
                }
            }
            let hasil = [];
            if(sakit.length > 0) hasil.push("Sakit: " + sakit.join(", "));
            if(izin.length > 0) hasil.push("Izin: " + izin.join(", "));
            if(alpa.length > 0) hasil.push("Alpa: " + alpa.join(", "));
            return hasil.length > 0 ? hasil.join("\n") : "Nihil (Hadir Semua)";
        }

        function ambilDataPilihan() {
            const checkboxes = document.querySelectorAll('.chk-riwayat:checked');
            if(checkboxes.length === 0) {
                alert("Centang minimal satu riwayat mengajar yang ingin diekspor!");
                return null;
            }
            let dataEkspor = [];
            checkboxes.forEach(cb => { dataEkspor.push(db_jurnal[parseInt(cb.value)]); });
            dataEkspor.sort((a, b) => new Date(a.tgl) - new Date(b.tgl));
            return dataEkspor;
        }

        function eksporPilihanExcel() {
            const dataToExport = ambilDataPilihan();
            if(!dataToExport) return;
            const dataExcel = dataToExport.map((j, i) => ({
                "No": i + 1, "Tanggal": j.tgl, "Kelas": j.kelas, "Materi (ATP)": j.atp,
                "Hadir": j.statistik.H, "Sakit": j.statistik.S, "Izin": j.statistik.I, "Alpa": j.statistik.A,
                "Daftar Siswa Tidak Hadir": dapatkanNamaAbsen(j.absensi), "Catatan Guru": j.catatan || "-"
            }));
            const worksheet = XLSX.utils.json_to_sheet(dataExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Jurnal Terpilih");
            XLSX.writeFile(workbook, "Laporan_Jurnal_Ang.xlsx");
        }

        function eksporPilihanPDF() {
            const dataToExport = ambilDataPilihan();
            if(!dataToExport) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); 
            doc.setFontSize(14); doc.text("Laporan Jurnal Mengajar", 14, 15);
            doc.setFontSize(10); doc.setTextColor(100); doc.text("Aplikasi Buku Induk Digital", 14, 21);

            const tableColumn = ["Tgl", "Kelas", "Materi / ATP", "H", "S", "I", "A", "Siswa Tidak Hadir"];
            const tableRows = [];

            dataToExport.forEach(j => {
                tableRows.push([
                    j.tgl, j.kelas, j.atp, j.statistik.H, j.statistik.S, j.statistik.I, j.statistik.A, dapatkanNamaAbsen(j.absensi)
                ]);
            });

            doc.autoTable({
                head: [tableColumn], body: tableRows, startY: 28, theme: 'grid',
                headStyles: { fillColor: [13, 110, 253] }, styles: { fontSize: 8 },
                columnStyles: { 0: { cellWidth: 20 }, 1: { cellWidth: 20 }, 2: { cellWidth: 70 }, 3: { cellWidth: 8 }, 4: { cellWidth: 8 }, 5: { cellWidth: 8 }, 6: { cellWidth: 8 }, 7: { cellWidth: 70 } }
            });
            doc.save("Laporan_Jurnal_Ang.pdf");
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SAM Assistant Ready!'))
                .catch(err => console.log('Gagal memuat SAM', err));
        });
    }
    </script>
</body>
</html>
